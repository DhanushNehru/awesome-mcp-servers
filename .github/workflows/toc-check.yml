name: TOC check

on:
  pull_request:
    branches: [main]
    paths:
      - README.md
      - CONTRIBUTING.md
      - .github/workflows/toc-check.yml
  push:
    branches: [main]
    paths:
      - README.md
      - CONTRIBUTING.md
      - .github/workflows/toc-check.yml

jobs:
  toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate README table of contents
        run: npx markdown-toc -i README.md
      - name: Fail if TOC is out of date
        run: git diff --exit-code README.md
